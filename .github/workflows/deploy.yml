name: CI/CD CloudDeploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest
      - run: pytest test_app.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to EC2
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key app.py "$EC2_USER@$EC2_HOST:~/app.py"
          ssh -i ~/.ssh/deploy_key "$EC2_USER@$EC2_HOST" \
            "pkill -f 'python3 app.py' || true; sleep 1; nohup python3 ~/app.py > /tmp/app.log 2>&1 & sleep 2 && curl -s http://localhost:5000/health"
